# Taskfile for the Claimward macOS app.
# Install go-task: https://taskfile.dev   (pkgx install task)
#
# Quick start:
#   task config:init     # write a starter config.json (edit it)
#   task install-helper  # install the root helper (asks for sudo)
#   task start           # build the Svelte UI + app and launch the tray
version: "3"

vars:
  APP: claimward-app
  HELPER: claimward-helper
  BIN: bin
  DIST: internal/uiserver/dist
  CONFIG_DIR: "{{.HOME}}/Library/Application Support/Claimward"

env:
  CGO_ENABLED: "1" # the app links WebKit/Cocoa via webview_go + systray

tasks:
  default:
    desc: List available tasks
    cmds: [task --list]
    silent: true

  deps:
    desc: Install frontend (npm) and Go dependencies
    cmds:
      - npm --prefix frontend install
      - go mod download

  ui:
    desc: Build the Svelte UI (embedded into the binary via go:embed)
    cmds:
      - npm --prefix frontend install
      - npm --prefix frontend run build
    sources:
      - frontend/src/**/*
      - frontend/index.html
      - frontend/package.json
      - frontend/vite.config.js
      - frontend/svelte.config.js
    generates:
      - "{{.DIST}}/**/*"

  build:app:
    desc: Build the tray app (depends on the built UI)
    deps: [ui]
    cmds:
      - go build -o {{.BIN}}/{{.APP}} ./cmd/claimward-app
    sources:
      - "**/*.go"
      - "{{.DIST}}/**/*"
    generates:
      - "{{.BIN}}/{{.APP}}"

  build:helper:
    desc: Build the privileged helper
    cmds:
      - go build -o {{.BIN}}/{{.HELPER}} ./cmd/claimward-helper
    sources:
      - "**/*.go"
    generates:
      - "{{.BIN}}/{{.HELPER}}"

  build:
    desc: Build the app and the helper
    deps: [build:app, build:helper]

  install-helper:
    desc: Install the privileged helper as a root LaunchDaemon (sudo)
    deps: [build:helper]
    cmds:
      - sudo ./scripts/install-helper.sh

  uninstall-helper:
    desc: Remove the privileged helper LaunchDaemon (sudo)
    cmds:
      - sudo ./scripts/uninstall-helper.sh

  run:
    desc: Build and launch the tray app (foreground)
    deps: [build:app]
    cmds:
      - cmd: |
          if [ ! -S /var/run/claimward-helper.sock ]; then
            echo "⚠️  helper socket not found — run 'task install-helper' to connect the tunnel."
          fi
        silent: true
      - ./{{.BIN}}/{{.APP}}

  start:
    desc: Build the UI + app and launch it (alias for run)
    deps: [run]

  bundle:
    desc: Build a Claimward.app bundle (menu-bar agent + foreground dashboard)
    deps: [build]
    cmds:
      - cmd: |
          set -e
          APP="dist/Claimward.app"
          rm -rf "$APP"
          mkdir -p "$APP/Contents/MacOS" "$APP/Contents/Resources"
          cp bin/{{.APP}} "$APP/Contents/MacOS/{{.APP}}"
          cp bin/{{.HELPER}} "$APP/Contents/MacOS/{{.HELPER}}"
          cp deploy/Info.app.plist "$APP/Contents/Info.plist"
          # Nested regular app whose window LaunchServices will foreground.
          DASH="$APP/Contents/Resources/Dashboard.app"
          mkdir -p "$DASH/Contents/MacOS"
          cp deploy/Info.dashboard.plist "$DASH/Contents/Info.plist"
          # A real copy (NOT a symlink): a symlink resolves back into Claimward.app
          # and LaunchServices would attribute the process to the LSUIElement agent
          # bundle, so the window would never come to the foreground.
          cp bin/{{.APP}} "$DASH/Contents/MacOS/dashboard"
          echo "built $APP"
        silent: true

  start:bundle:
    desc: Build the .app bundle and launch it (window comes to the foreground)
    deps: [bundle]
    cmds:
      - open dist/Claimward.app

  dev:ui:
    desc: Run the Vite dev server for the Svelte UI (hot reload)
    cmds:
      - npm --prefix frontend run dev

  config:init:
    desc: Write a starter config.json wired to the local Dex OIDC server
    cmds:
      - cmd: |
          dir="{{.CONFIG_DIR}}"
          file="$dir/config.json"
          if [ -f "$file" ]; then
            echo "config already exists: $file"
            exit 0
          fi
          mkdir -p "$dir"
          cat > "$file" <<'JSON'
          {
            "server_url": "http://127.0.0.1:8080",
            "provider": "oidc",
            "oidc_issuer": "http://127.0.0.1:5556/dex",
            "oidc_client_id": "claimward"
          }
          JSON
          echo "wrote $file (OIDC via local Dex)"
        silent: true

  fmt:
    desc: Format Go sources
    cmds: [gofmt -w .]

  vet:
    desc: Vet Go sources
    cmds: [go vet ./...]

  clean:
    desc: Remove build artifacts (keeps the committed UI dist)
    cmds:
      - rm -rf {{.BIN}} dist frontend/node_modules frontend/.vite
